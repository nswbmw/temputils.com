  <!-- Prevent theme flash (FOUC) -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('temputils_theme');
        var theme = (stored === 'light' || stored === 'dark')
          ? stored
          : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.dataset.theme = theme;
      } catch (e) { }
    })();
  </script>

  <!-- Google tag (gtag.js) -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300;1,9..144,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --white: #ffffff;
      --off: #f9f8f6;
      --paper: #f4f2ee;
      --ink: #1a1916;
      --ink2: #4a4844;
      --ink3: #7b7771;
      --ink4: #a39d95;
      --border: #e8e5e0;
      --border2: #d4d0ca;
      --accent: #2563eb;
      --accent-light: #eff4ff;
      --accent-mid: #bfcffe;
      --green: #16a34a;
      --green-light: #f0fdf4;
      --green-mid: #bbf7d0;
      --amber: #d97706;
      --amber-light: #fffbeb;
      --amber-mid: #fde68a;
      --teal: #0891b2;
      --teal-light: #ecfeff;
      --teal-mid: #a5f3fc;
      --sky: #0284c7;
      --sky-light: #e0f2fe;
      --sky-mid: #bae6fd;
      --indigo: #4f46e5;
      --indigo-light: #eef2ff;
      --indigo-mid: #c7d2fe;
      --orange: #ea580c;
      --orange-light: #fff7ed;
      --orange-mid: #fdba74;
      --fuchsia: #c026d3;
      --fuchsia-light: #fdf4ff;
      --fuchsia-mid: #f5d0fe;
      --slate: #64748b;
      --slate-light: #f8fafc;
      --slate-mid: #cbd5e1;
      --purple: #7c3aed;
      --purple-light: #f5f3ff;
      --purple-mid: #ddd6fe;
      --pink: #db2777;
      --pink-light: #fdf2f8;
      --pink-mid: #fbcfe8;
      --surface: var(--white);
      --surface-soft: var(--off);
      --surface-muted: var(--paper);
      --nav-bg: rgba(255, 255, 255, 0.92);
      --intro-dot: #d0cdc8;
      --shadow-soft: 0 4px 6px -1px rgba(0, 0, 0, 0.07), 0 16px 40px -4px rgba(0, 0, 0, 0.1);
      --shadow-lift: 0 8px 20px rgba(0, 0, 0, 0.15);
      --btn-dark-hover: #111111;
      --scrollbar-track: #f1efeb;
      --scrollbar-thumb: #c6c1b8;
      --scrollbar-thumb-hover: #a59f95;
    }

    html[data-theme='dark'] {
      --white: #0f0f11;
      --off: #15161a;
      --paper: #1b1d22;
      --ink: #f5f3ef;
      --ink2: #d1ccc3;
      --ink3: #aca59a;
      --ink4: #827a70;
      --border: #2a2d33;
      --border2: #3a3e46;
      --accent-light: rgba(37, 99, 235, 0.18);
      --accent-mid: rgba(191, 207, 254, 0.32);
      --green-light: rgba(22, 163, 74, 0.16);
      --green-mid: rgba(187, 247, 208, 0.26);
      --amber-light: rgba(217, 119, 6, 0.16);
      --amber-mid: rgba(253, 230, 138, 0.28);
      --teal-light: rgba(8, 145, 178, 0.16);
      --teal-mid: rgba(165, 243, 252, 0.26);
      --sky-light: rgba(2, 132, 199, 0.16);
      --sky-mid: rgba(186, 230, 253, 0.28);
      --indigo-light: rgba(79, 70, 229, 0.16);
      --indigo-mid: rgba(199, 210, 254, 0.3);
      --orange-light: rgba(234, 88, 12, 0.16);
      --orange-mid: rgba(253, 186, 116, 0.3);
      --fuchsia-light: rgba(192, 38, 211, 0.16);
      --fuchsia-mid: rgba(245, 208, 254, 0.3);
      --slate-light: rgba(248, 250, 252, 0.08);
      --slate-mid: rgba(203, 213, 225, 0.28);
      --purple-light: rgba(124, 58, 237, 0.16);
      --purple-mid: rgba(221, 214, 254, 0.26);
      --pink-light: rgba(219, 39, 119, 0.16);
      --pink-mid: rgba(251, 207, 232, 0.26);
      --surface: #111317;
      --surface-soft: #17191e;
      --surface-muted: #1d2026;
      --nav-bg: rgba(15, 15, 17, 0.88);
      --intro-dot: #3a3d45;
      --shadow-soft: 0 8px 24px rgba(0, 0, 0, 0.32);
      --shadow-lift: 0 10px 30px rgba(0, 0, 0, 0.28);
      --btn-dark-hover: #22252b;
      --scrollbar-track: #15181d;
      --scrollbar-thumb: #4f5560;
      --scrollbar-thumb-hover: #6a7280;
    }

    html {
      scroll-behavior: smooth;
      scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track);
      scrollbar-width: thin;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--surface);
      color: var(--ink);
      line-height: 1.6;
      overflow-x: hidden;
      transition: background 0.2s ease, color 0.2s ease;
    }

    body::-webkit-scrollbar {
      width: 11px;
    }

    body::-webkit-scrollbar-track {
      background: var(--scrollbar-track);
    }

    body::-webkit-scrollbar-thumb {
      background: var(--scrollbar-thumb);
      border-radius: 999px;
      border: 2px solid var(--scrollbar-track);
    }

    body::-webkit-scrollbar-thumb:hover {
      background: var(--scrollbar-thumb-hover);
    }

    body::-webkit-scrollbar-corner {
      background: var(--scrollbar-track);
    }


    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.5rem;
      height: 62px;
      background: var(--nav-bg);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 2.5rem;
    }

    .nav-logo {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 1.2rem;
      color: var(--ink);
      text-decoration: none;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .logo-mark {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: block;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.84rem;
      font-weight: 400;
      color: var(--ink2);
      text-decoration: none;
      letter-spacing: 0.01em;
      transition: color 0.18s;
    }

    .nav-links a:hover {
      color: var(--ink);
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ── NAV ICON CONTROLS ── */
    .nav-icon-btn {
      width: 36px;
      height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--ink2);
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.18s;
      flex-shrink: 0;
    }

    .nav-icon-btn:hover {
      color: var(--ink);
      border-color: var(--ink3);
      background: var(--surface-soft);
    }

    .nav-icon-btn:focus-visible {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
    }

    .nav-icon-btn svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .lang-switcher {
      position: relative;
    }

    .lang-switcher.open .lang-btn {
      color: var(--ink);
      border-color: var(--ink3);
      background: var(--surface-soft);
    }

    .lang-dropdown {
      position: absolute;
      top: calc(100% + 7px);
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 5px;
      min-width: 188px;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-5px);
      transition: all 0.17s ease;
      box-shadow: var(--shadow-soft);
      z-index: 300;
    }

    .lang-switcher.open .lang-dropdown {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .lang-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.13s;
      gap: 8px;
    }

    .lang-option:hover {
      background: var(--surface-soft);
    }

    .lang-option.active {
      background: var(--accent-light);
    }

    .lang-option-left {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .lang-flag {
      font-size: 16px;
      line-height: 1;
    }

    .lang-name {
      font-size: 0.83rem;
      font-weight: 500;
      color: var(--ink);
    }

    .lang-sub {
      display: none;
    }

    .lang-check {
      color: var(--accent);
      font-size: 11px;
      opacity: 0;
      flex-shrink: 0;
      font-weight: 700;
    }

    .lang-option.active .lang-check {
      opacity: 1;
    }

    .lang-option.active .lang-name {
      color: var(--accent);
    }

    .nav-primary-link {
      font-size: 0.82rem;
      font-weight: 600;
      padding: 8px 18px;
      background: var(--ink);
      color: var(--white);
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.18s, transform 0.15s;
      white-space: nowrap;
    }

    .nav-primary-link:hover {
      background: var(--btn-dark-hover);
      transform: translateY(-1px);
    }

    /* ── HERO ── */
    .intro-panel {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 7rem 2rem 5rem;
      position: relative;
      overflow: hidden;
      background: var(--surface);
    }

    /* subtle dot grid */
    .intro-panel::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, var(--intro-dot) 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 0.45;
      mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 20%, transparent 100%);
    }

    .intro-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink3);
      border: 1px solid var(--border2);
      border-radius: 100px;
      padding: 5px 14px;
      margin-bottom: 2.2rem;
      position: relative;
      animation: fadeUp 0.55s ease both;
    }

    .eyebrow-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2.2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.25;
      }
    }

    h1 {
      font-family: 'Fraunces', serif;
      font-weight: 400;
      font-size: clamp(3rem, 6.5vw, 6rem);
      line-height: 1.06;
      letter-spacing: -0.035em;
      margin-bottom: 1.6rem;
      position: relative;
      animation: fadeUp 0.55s 0.08s ease both;
      color: var(--ink);
    }

    h1 em {
      font-style: italic;
      font-weight: 300;
      color: var(--ink2);
    }

    .intro-summary {
      font-size: clamp(1rem, 1.8vw, 1.15rem);
      color: var(--ink3);
      max-width: 480px;
      line-height: 1.75;
      margin-bottom: 2.8rem;
      animation: fadeUp 0.55s 0.16s ease both;
      position: relative;
    }

    .intro-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeUp 0.55s 0.24s ease both;
      position: relative;
    }

    .btn-primary {
      font-size: 0.88rem;
      font-weight: 600;
      padding: 12px 26px;
      background: var(--ink);
      color: var(--white);
      border: none;
      border-radius: 10px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.18s;
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }

    .btn-primary:hover {
      background: var(--btn-dark-hover);
      transform: translateY(-2px);
      box-shadow: var(--shadow-lift);
    }

    .btn-secondary {
      font-size: 0.88rem;
      font-weight: 500;
      padding: 12px 26px;
      background: transparent;
      color: var(--ink2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.18s;
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }

    .btn-secondary:hover {
      color: var(--ink);
      border-color: var(--ink3);
      background: var(--surface-soft);
    }

    .intro-metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 2rem;
      width: min(720px, 100%);
      margin-top: 5rem;
      padding-top: 3.5rem;
      border-top: 1px solid var(--border);
      animation: fadeUp 0.55s 0.32s ease both;
      position: relative;
    }

    .stat {
      text-align: center;
      min-width: 0;
    }

    .stat-num {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 2.2rem;
      color: var(--ink);
      letter-spacing: -0.04em;
      display: block;
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 0.72rem;
      color: var(--ink4);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── SCROLL REVEAL ── */
    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.7s ease, transform 0.7s ease;
      will-change: opacity, transform;
    }

    .reveal.in-view {
      opacity: 1;
      transform: translateY(0);
    }

    .reveal[data-reveal-delay='1'] {
      transition-delay: 0.08s;
    }

    .reveal[data-reveal-delay='2'] {
      transition-delay: 0.16s;
    }

    .reveal[data-reveal-delay='3'] {
      transition-delay: 0.24s;
    }

    .reveal[data-reveal-delay='4'] {
      transition-delay: 0.32s;
    }

    .reveal[data-reveal-delay='5'] {
      transition-delay: 0.4s;
    }

    @media (prefers-reduced-motion: reduce) {
      html {
        scroll-behavior: auto;
      }

      .reveal,
      .reveal.in-view {
        opacity: 1;
        transform: none;
        transition: none;
      }
    }

    /* ── SECTIONS ── */
    .content-section {
      padding: 6rem 2rem;
      max-width: 1080px;
      margin: 0 auto;
    }

    .content-section.border-top {
      border-top: 1px solid var(--border);
    }

    .section-kicker {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--ink4);
      margin-bottom: 1rem;
    }

    .section-heading {
      font-family: 'Fraunces', serif;
      font-weight: 400;
      font-size: clamp(1.9rem, 3.5vw, 2.9rem);
      letter-spacing: -0.03em;
      line-height: 1.15;
      margin-bottom: 1rem;
      color: var(--ink);
    }

    .section-summary {
      font-size: 0.95rem;
      color: var(--ink3);
      max-width: 460px;
      line-height: 1.75;
      margin-bottom: 3.5rem;
    }

    /* ── TOOLS GRID ── */
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    .tool-card {
      background: var(--surface);
      padding: 2rem 1.75rem;
      display: flex;
      flex-direction: column;
      gap: 11px;
      text-decoration: none;
      color: inherit;
      position: relative;
      overflow: hidden;
      transition: background 0.18s;
    }

    .tool-card:hover {
      background: var(--surface-soft);
    }

    .tool-card:hover .tool-arrow {
      opacity: 1;
      transform: translate(0, 0);
    }

    .tool-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border: 1px solid var(--border);
      color: var(--ink);
    }

    .tool-icon svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .tool-icon svg.fill-icon {
      fill: currentColor;
      stroke: none;
    }

    .tool-icon svg.mixed-icon .fill-shape {
      fill: currentColor;
      stroke: none;
    }

    .tool-icon svg.mixed-icon .stroke-shape {
      fill: none;
      stroke: currentColor;
    }

    .tool-id {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--ink4);
    }

    .tool-name {
      font-family: 'Fraunces', serif;
      font-weight: 400;
      font-size: 1.1rem;
      letter-spacing: -0.02em;
      color: var(--ink);
    }

    .tool-desc {
      font-size: 0.84rem;
      color: var(--ink3);
      line-height: 1.65;
      flex: 1;
    }

    .tool-tags {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-top: 2px;
    }

    .tag {
      font-size: 0.65rem;
      font-family: 'DM Mono', monospace;
      padding: 3px 8px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: var(--surface-soft);
      color: var(--ink3);
    }

    .tool-arrow {
      position: absolute;
      top: 1.6rem;
      right: 1.6rem;
      font-size: 0.9rem;
      color: var(--ink4);
      opacity: 0;
      transform: translate(-4px, 4px);
      transition: all 0.18s;
    }

    .tool-card {
      --tool-accent: var(--accent);
      --tool-icon-bg: var(--accent-light);
      --tool-icon-border: var(--accent-mid);
      --tool-tag-bg: var(--accent-light);
      --tool-tag-border: var(--accent-mid);
    }

    .tool-card .tool-icon {
      background: var(--tool-icon-bg);
      border-color: var(--tool-icon-border);
    }

    .tool-card .tag.accent {
      background: var(--tool-tag-bg);
      border-color: var(--tool-tag-border);
      color: var(--tool-accent);
    }

    .tool-theme-note {
      --tool-accent: var(--accent);
      --tool-icon-bg: var(--accent-light);
      --tool-icon-border: var(--accent-mid);
      --tool-tag-bg: var(--accent-light);
      --tool-tag-border: var(--accent-mid);

    const LS_KEY = 'temputils_lang';
    const THEME_KEY = 'temputils_theme';

    function detectTheme() {
      const stored = localStorage.getItem(THEME_KEY);
      if (stored === 'light' || stored === 'dark') return stored;
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }

    function applyTheme(theme) {
      currentTheme = theme;
      document.documentElement.dataset.theme = theme;
      const tb = document.getElementById('themeBtn');
      if (tb) tb.setAttribute('aria-pressed', String(theme === 'dark'));
    }

    function detectLang() {
      const stored = localStorage.getItem(LS_KEY);
      if (stored && T[stored]) return stored;
      const navLangs = Array.from(navigator.languages || [navigator.language || 'en']);
      for (const l of navLangs) {
        const c = l.toLowerCase();
        if (c.startsWith('zh-tw') || c.startsWith('zh-hk') || c.startsWith('zh-mo')) return 'zh-TW';
        if (c.startsWith('zh')) return 'zh-CN';
        if (c.startsWith('ja')) return 'ja';
        if (c.startsWith('pt')) return 'pt';
        if (c.startsWith('es')) return 'es';
        if (c.startsWith('fr')) return 'fr';
        if (c.startsWith('en')) return 'en';
      }
      return 'en';
    }

    let currentTheme = detectTheme();
    let currentLang = detectLang();

    function getSortedTools() {
      return [...TOOLS].sort((a, b) => a.order - b.order);
    }

    function renderToolCard(tool, t) {
      const tags = tool.tagKeys.map(tagKey => `<span class="tag accent">${t[tagKey] || tagKey}</span>`).join('');
      const idLabel = tool.idKey ? (t[tool.idKey] || tool.label) : tool.label;
      if (tool.status === 'coming') {
        return `
      <div class="tool-card coming ${tool.themeKey}">
        <div class="tool-icon">${ICONS[tool.iconKey] || ''}</div>
        <div><div class="tool-id">${idLabel}</div><div class="tool-name">${t[tool.nameKey] || tool.label}</div></div>
        <p class="tool-desc">${t[tool.descKey] || ''}</p>
        <span class="soon-pill">${t['tool.more.id'] || 'Coming Soon'}</span>
      </div>
    `;
      }
      return `
    <a href="${tool.url}" class="tool-card ${tool.themeKey}" target="_blank">
      <div class="tool-arrow">&#8599;</div>
      <div class="tool-icon">${ICONS[tool.iconKey] || ''}</div>
      <div><div class="tool-id">${idLabel}</div><div class="tool-name">${t[tool.nameKey] || tool.label}</div></div>
      <p class="tool-desc">${t[tool.descKey] || ''}</p>
      <div class="tool-tags">${tags}</div>
    </a>
  `;
    }

    function renderTools() {
      const grid = document.getElementById('toolsGrid');
      const t = T[currentLang];
      if (!grid || !t) return;
      grid.innerHTML = getSortedTools().map(tool => renderToolCard(tool, t)).join('');
    }

    function updateToolCount() {
      const count = document.getElementById('toolCount');
      if (!count) return;
      count.textContent = String(TOOLS.filter(tool => tool.status === 'live').length + '+');
    }

    function applyLang(code) {
      const t = T[code];
      if (!t) return;
      currentLang = code;
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key] !== undefined) el.textContent = t[key];
      });
      document.querySelectorAll('[data-i18n-content]').forEach(el => {
        const key = el.getAttribute('data-i18n-content');
        if (t[key] !== undefined) el.setAttribute('content', t[key]);
      });
      renderTools();
      updateToolCount();
      document.documentElement.lang = code;
      if (t['meta.title']) document.title = t['meta.title'];
      document.querySelectorAll('.lang-option').forEach(opt => {
        const active = opt.dataset.code === code;
        opt.classList.toggle('active', active);
      });
    }

    function buildDropdown() {
      const dd = document.getElementById('langDropdown');
      dd.innerHTML = LANGS.map(l => `
    <div class="lang-option${l.code === currentLang ? ' active' : ''}" data-code="${l.code}">
      <div class="lang-option-left">
        <span class="lang-flag">${l.flag}</span>
        <span class="lang-name">${l.native}</span>
      </div>
      <span class="lang-check">&#10003;</span>
    </div>
  `).join('');
      dd.querySelectorAll('.lang-option').forEach(opt => {
        opt.addEventListener('click', () => {
          const code = opt.dataset.code;
          localStorage.setItem(LS_KEY, code);
          applyLang(code);
          close();
        });
      });
    }

    const switcher = document.getElementById('langSwitcher');
    const btn = document.getElementById('langBtn');
    const themeBtn = document.getElementById('themeBtn');

    function close() {
      switcher.classList.remove('open');
      btn.setAttribute('aria-expanded', 'false');
    }

    function initReveal() {
      const items = document.querySelectorAll('.reveal');
      if (!items.length) return;
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches || !('IntersectionObserver' in window)) {
        items.forEach(item => item.classList.add('in-view'));
        return;
      }
      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (!entry.isIntersecting) return;
          entry.target.classList.add('in-view');
          observer.unobserve(entry.target);
        });
      }, { threshold: 0.14, rootMargin: '0px 0px -8% 0px' });
      items.forEach(item => observer.observe(item));
    }

    btn.addEventListener('click', e => {
      e.stopPropagation();
      const isOpen = switcher.classList.toggle('open');
      btn.setAttribute('aria-expanded', String(isOpen));
    });

    themeBtn.addEventListener('click', () => {
      const nextTheme = currentTheme === 'dark' ? 'light' : 'dark';
      localStorage.setItem(THEME_KEY, nextTheme);
      applyTheme(nextTheme);
    });

    document.addEventListener('click', e => { if (!switcher.contains(e.target)) close(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') close(); });

    applyTheme(currentTheme);
    buildDropdown();
    applyLang(currentLang);
    initReveal();
  </script>
